name: Azure FOCUS Import

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Operation to run
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - seed
          - schedule
          - status

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-focus-import
  cancel-in-progress: false

jobs:
  run-import:
    runs-on: ubuntu-latest
    env:
      CONFIG_PATH: config.pipeline.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Materialize pipeline config
        shell: bash
        run: |
          if [ -z "${{ secrets.AZURE_FOCUS_CONFIG_YAML_B64 }}" ]; then
            echo "Missing secret: AZURE_FOCUS_CONFIG_YAML_B64"
            exit 1
          fi

          echo "${{ secrets.AZURE_FOCUS_CONFIG_YAML_B64 }}" | base64 --decode > "$CONFIG_PATH"
          echo "Wrote config to $CONFIG_PATH"

      - name: Run operation
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.operation }}" in
            dry-run)
              azure-focus-export seed --dry-run --config "$CONFIG_PATH"
              ;;
            seed)
              azure-focus-export seed --config "$CONFIG_PATH"
              ;;
            schedule)
              azure-focus-export schedule --config "$CONFIG_PATH"
              ;;
            status)
              azure-focus-export status --config "$CONFIG_PATH"
              ;;
            *)
              echo "Unsupported operation: ${{ inputs.operation }}"
              exit 1
              ;;
          esac
